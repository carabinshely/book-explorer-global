name: Website PR checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test-build-seo:
    name: Test, build, and SEO check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run seo:check
      - run: npm run seo:check:committed
      - run: npm run build
      - run: npm run seo:check:dist
